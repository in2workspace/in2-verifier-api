<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <header class="site-header">
        <div class="site-identity">
            <img src="/img/dome-icon-white.png" alt="Marketplace" />
            <h1>Marketplace</h1>
        </div>
        <nav class="site-navigation">
            <ul class="nav">
                <li><a href="#">About</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>


    <div class="login-container">
        <main class="main">
            <h1>Welcome to the DOME Marketplace</h1>
            <div class="qr-code">
                <img src="../static/qr_code.png" alt="QR Code for EUDI Wallet">
            </div>
            <p>Your organisation must be registered in the marketplace before you can login.</p>
            <button onclick="location.href='registration_page_url'">Register</button>
            <p class="help-text">Problems logging in? Get help from <a href="customer_support_url">customer support</a>.</p>
        </main>
    </div>

    <script src="/js/main.js"></script>

</body>

</html>
